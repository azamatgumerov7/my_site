<!DOCTYPE html>
<html>
<body>
  <!-- 1. Форма регистрации -->
  <h1>Регистрация</h1>
  <!-- 
    action="/register" — отправляем данные на адрес /register 
    method="POST" — метод отправки (для форм)
  -->
  <form action="/register" method="POST">
    <!-- name="username" — это имя поля, по нему server.js находит данные -->
    <input type="text" name="username" placeholder="Имя" required>
    <input type="email" name="email" placeholder="Email" required>
    <button type="submit">Зарегистрироваться</button>
  </form>
  
  <!-- 2. Место для отображения пользователей -->
  <h2>Все пользователи:</h2>
  <div id="users"></div> <!-- Сюда будем вставлять пользователей -->
  
  <!-- 3. JavaScript для загрузки пользователей -->
  <script>
    // Когда страница загрузилась...
    // fetch('/users') — отправляем запрос на /users
    fetch('/users')
      .then(res => res.json()) // Преобразуем ответ в JavaScript-объект
      .then(users => {
        // Превращаем массив пользователей в HTML
        document.getElementById('users').innerHTML = 
          users.map(u => `<p>${u.username} - ${u.email}</p>`).join('');
      });
  </script>
</body>
</html>
